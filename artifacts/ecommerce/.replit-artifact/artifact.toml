kind = "web"
previewPath = "/"
title = "E-Commerce Store"
version = "1.0.0"
id = "artifacts/ecommerce"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18857

[services.development]
run = "pnpm --filter @workspace/ecommerce run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecommerce", "run", "build" ]
publicDir = "artifacts/ecommerce/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18857"
BASE_PATH = "/"
